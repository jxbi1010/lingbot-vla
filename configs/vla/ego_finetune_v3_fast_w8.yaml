model:
  model_path: /home/ss-oss1/data/user/jxbi/lingbot/checkpoints/lingbot-vla-4b
  tokenizer_path: /home/ss-oss1/data/user/jxbi/lingbot/checkpoints/qwen2.5-vl-3b-instruct
  post_training: true
  adanorm_time: true
  old_adanorm: true

data:
  datasets_type: vla
  data_name: robotwin_example
  # Prefer a YAML list of LeRobot roots (one folder per dataset). A single string still works; comma-separated strings in one entry are split.
  train_path: /home/ss-oss1/data/user/yuqi/data/retarget_lerobot/lerobot_video_multiworker_test_v30
  val_path: /home/ss-oss1/data/user/yuqi/data/retarget_lerobot/lerobot_video_multiworker_test_v30   # Optional validation root(s); list or single string. Required when train.eval_frequency > 0.
  num_workers: 8
  norm_type: bounds_99_woclip
  norm_stats_file: assets/norm_stats/database_lerobot_00_norm.json #
  # chunk_subset / episode_subset: defaults for both splits (LeRobot data/chunk-* / global episode indices).
  # train_chunk_subset, val_chunk_subset, train_episode_subset, val_episode_subset: per-split overrides (null = use shared chunk_subset / episode_subset above).
  # Episode fields: explicit indices [0, 1, 2] or inclusive two-int range [first, last].
  chunk_subset: null
  episode_subset: null
  train_chunk_subset: null
  val_chunk_subset: null
  train_episode_subset: [0, 210000]
  val_episode_subset: [210001, 211237]   # Inclusive; max index = total_episodes - 1 for info.json total_episodes 211238.
  verify_timestamps_sync: false
  # Multi-GPU: rank 0 builds LeRobot dataset first (warms cache); other ranks wait then build.
  dataset_init_main_process_first: true
  dataset_pickle_cache_path: /home/ss-oss1/checkpoints/jianxin/cache/pickle/lerobot_video_multiworker_test_v30.pkl

train:
  output_dir: /home/ss-oss1/checkpoints/jianxin/output/ego_21w_v3_batch1024_fast
  loss_type: L1_fm
  data_parallel_mode: fsdp2
  enable_full_shard: false
  module_fsdp_enable: true
  use_compile: false
  use_wandb: true
  wandb_project: lingbot-vla-ego-pretrain
  wandb_name: ego_21w_v3_batch1024_fast
  rmpad: false
  rmpad_with_pos_ids: false
  ulysses_parallel_size: 1
  freeze_vision_encoder: false
  tokenizer_max_length: 24
  action_dim: 14
  max_action_dim: 75
  max_state_dim: 75
  lr: 4.0e-4
  lr_decay_style: constant
  num_train_epochs: 1
  micro_batch_size: 32
  global_batch_size: 1024
  max_steps: 1000000
  ckpt_manager: dcp
  save_steps: 2000
  save_epochs: 1
  enable_fp32: true
  enable_resume: true
  # More frequent gc + cuda.empty_cache via environ_meter.step (helps allocator churn; not OS page cache).
  empty_cache_steps: 500
  # Validation: val_path + eval_frequency. Default validates training model (eval mode). use_ema is only for EMA weights/checkpoints.
  # Set eval_use_ema: true only if you need EMA metrics (requires use_ema; fragile under FSDP2).
  use_ema: true
  eval_frequency: 0
  eval_steps: 2
  eval_use_ema: false