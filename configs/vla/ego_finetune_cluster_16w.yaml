model:
  model_path: /home/ss-oss1/data/user/jxbi/lingbot/checkpoints/lingbot-vla-4b
  tokenizer_path: /home/ss-oss1/data/user/jxbi/lingbot/checkpoints/qwen2.5-vl-3b-instruct
  post_training: true
  adanorm_time: true
  old_adanorm: true

data:
  datasets_type: vla
  data_name: robotwin_example
  train_path: /home/ss-oss1/data/dataset/egocentric/training_egocentric/retarget_lerobot/lerobot_video_multiworker_test/
  num_workers: 8
  norm_type: bounds_99_woclip
  norm_stats_file: assets/norm_stats/database_lerobot_00_norm.json #
