model:
  model_path: /home/ss-oss1/data/user/jxbi/lingbot/checkpoints/lingbot-vla-4b
  tokenizer_path: /home/ss-oss1/data/user/jxbi/lingbot/checkpoints/qwen2.5-vl-3b-instruct
  post_training: true
  adanorm_time: true
  old_adanorm: true

data:
  datasets_type: vla
  data_name: robotwin_example
  # Prefer a YAML list of LeRobot roots (one folder per dataset). A single string still works; comma-separated strings in one entry are split.
  train_path:
    - /home/ss-oss1/data/user/yuqi/data/retarget_lerobot/database_lerobot_00_v30
    - /home/ss-oss1/data/user/yuqi/data/retarget_lerobot/database_lerobot_01_v30
    - /home/ss-oss1/data/user/yuqi/data/retarget_lerobot/database_lerobot_02_v30
    - /home/ss-oss1/data/user/yuqi/data/retarget_lerobot/database_lerobot_03_v30
  # Optional validation root(s); list or single string. Requires train.use_ema, train.eval_frequency > 0.
  val_path:
    - /home/ss-oss1/data/user/yuqi/data/retarget_lerobot/database_lerobot_04_v30
  num_workers: 16
  norm_type: bounds_99_woclip
  norm_stats_file: assets/norm_stats/database_lerobot_00_norm.json #
  chunk_subset: null  # # [0] = chunk-000,[0, 99] = chunk-000 to chunk-099 inclusive, etc. (set to null for full data)
  episode_subset: null # inclusive e.g.[0,99]
  verify_timestamps_sync: false
  dataset_init_main_process_first: true # Multi-GPU: rank 0 builds LeRobot dataset first (warms cache); other ranks wait then build.

train:
  output_dir: /checkpoints/jianxin/output/ego_test_local_yuqi_v3
  loss_type: L1_fm
  data_parallel_mode: fsdp2
  enable_full_shard: false
  module_fsdp_enable: true
  use_compile: false
  use_wandb: true
  wandb_project: lingbot-vla-ego-pretrain
  wandb_name: ego-pretrain-10k-video-test-16workers
  rmpad: false
  rmpad_with_pos_ids: false
  ulysses_parallel_size: 1
  freeze_vision_encoder: false
  tokenizer_max_length: 24
  action_dim: 14
  max_action_dim: 75
  max_state_dim: 75
  lr: 4.0e-4
  lr_decay_style: constant
  num_train_epochs: 10
  micro_batch_size: 32
  global_batch_size: 1024
  max_steps: 1000000
  ckpt_manager: dcp
  save_steps: 5000
  save_epochs: 1
  enable_fp32: true
  enable_resume: true
  # Validation (EMA model, eval mode): set use_ema true, val_path, then eval_frequency > 0.
  use_ema: true
  eval_frequency: 1000
  eval_steps: 50